<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Ingelec - Archive</title>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .day-card { background: white; border-radius: 12px; margin-bottom: 10px; padding: 10px; border-left: 5px solid #27ae60; }
        .shift-info { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .name { font-weight: bold; color: var(--primary); }
        
        /* Style l'Archive */
        .archive-section { margin-top: 30px; }
        .archive-btn { width: 100%; padding: 12px; background: #34495e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .archive-content { display: none; margin-top: 10px; }
        .archive-week { background: #ebedef; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; border: 1px solid #ccc; }
        .archive-week h4 { margin: 0 0 5px 0; color: #555; border-bottom: 1px solid #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Planning Maintenance</h2>
        <p id="currentDate" style="color: #7f8c8d;"></p>
    </div>

    <div id="schedule"></div>

    <div class="archive-section">
        <button class="archive-btn" onclick="toggleArchive()">📁 Voir l'Archive (Historique)</button>
        <div id="archiveContent" class="archive-content"></div>
    </div>

    <button style="width:100%; margin-top:20px; padding:10px; background:#bdc3c7; border:none; border-radius:8px; cursor:pointer;" onclick="resetAll()">Réinitialiser Tout</button>
</div>

<script>
    const techs = ["Ismail", "Hamza", "Hicham"];
    const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];

    function getRotation(date) {
        const ref = new Date('2026-04-06');
        const diffWeeks = Math.floor((date - ref) / (1000 * 60 * 60 * 24 * 7));
        const cycle = ((diffWeeks % 3) + 3) % 3;
        if (cycle === 0) return ["Ismail", "Hamza", "Hicham"];
        if (cycle === 1) return ["Hamza", "Hicham", "Ismail"];
        return ["Hicham", "Ismail", "Hamza"];
    }

    function init() {
        const today = new Date();
        document.getElementById('currentDate').innerText = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        
        // حفظ بيانات السيمانة في الأرشيف إذا انتهت
        saveToArchive();
        renderCurrentWeek();
        renderArchive();
    }

    function renderCurrentWeek() {
        const scheduleDiv = document.getElementById('schedule');
        const currentShifts = getRotation(new Date());
        let html = "";
        days.forEach((day, i) => {
            html += `<div class="day-card">
                <div style="font-weight:bold; color:#27ae60; margin-bottom:5px;">${day}</div>
                <div class="shift-info"><span>Matin:</span> <span class="name">${currentShifts[0]}</span></div>
                <div class="shift-info"><span>Soir:</span> <span class="name">${currentShifts[1]}</span></div>
                <div class="shift-info"><span>Nuit:</span> <span class="name">${currentShifts[2]}</span></div>
            </div>`;
        });
        scheduleDiv.innerHTML = html;
    }

    function saveToArchive() {
        const today = new Date();
        const weekKey = "week_" + Math.floor(today / (1000 * 60 * 60 * 24 * 7));
        let archive = JSON.parse(localStorage.getItem('ingelec_archive') || '{}');
        
        if (!archive[weekKey]) {
            const currentShifts = getRotation(today);
            archive[weekKey] = {
                dateRange: "Semaine du " + today.toLocaleDateString(),
                staff: currentShifts
            };
            localStorage.setItem('ingelec_archive', JSON.stringify(archive));
        }
    }

    function renderArchive() {
        const archiveDiv = document.getElementById('archiveContent');
        let archive = JSON.parse(localStorage.getItem('ingelec_archive') || '{}');
        let html = "";
        for (let key in archive) {
            html += `<div class="archive-week">
                <h4>${archive[key].dateRange}</h4>
                Matin: ${archive[key].staff[0]} | Soir: ${archive[key].staff[1]} | Nuit: ${archive[key].staff[2]}
            </div>`;
        }
        archiveDiv.innerHTML = html || "Aucun archive pour le moment.";
    }

    function toggleArchive() {
        const content = document.getElementById('archiveContent');
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    }

    function resetAll() {
        if(confirm("Effacer tout l'archive ?")) {
            localStorage.removeItem('ingelec_archive');
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
