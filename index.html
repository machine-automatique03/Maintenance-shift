<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingelec ProTask Splash</title>
    <style>
        :root { --ingelec-blue: #0056b3; --light-bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-bg); padding: 0; margin: 0; }
        
        /* واجهة الدخول الخارجية (Splash Screen) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 50px 20px; box-sizing: border-box;
        }

        /* حاوية اللوغو - تصميم كيشبه الصورة المصدر */
        .logo-container { text-align: center; }
        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;
        }
        
        /* الرمز الماسي الأزرق */
        .logo-diamond {
            position: relative; width: 60px; height: 60px; background-color: #37478e;
            transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
        }
        /* الخطوط الداخلية للرمز */
        .logo-line { position: absolute; background: white; border-radius: 1px; }
        .logo-line.main { width: 4px; height: 35px; transform: rotate(-45deg); left: 35%; top: 20%; }
        .logo-line.branch { width: 35px; height: 4px; transform: rotate(-45deg); left: 20%; top: 50%; }
        /* الخط الأحمر الصغير */
        .logo-line.red { width: 25px; height: 3px; background-color: #c0392b; transform: rotate(-45deg); left: 10%; top: 35%; }

        /* الكلمة النصية Ingelec */
        .logo-text { font-size: 3.5em; font-weight: 900; color: #37478e; margin: 0; }

        /* الشعار (Slogan) */
        .slogan { font-size: 1em; color: var(--ingelec-blue); margin-top: 15px; text-transform: capitalize; border-left: 2px solid var(--ingelec-blue); padding-left: 10px; }

        /* عنوان التطبيق (اسم المشروع) */
        .app-title-card {
            background: #f8f9fa; padding: 15px 30px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
        }
        .app-name { font-size: 1.5em; font-weight: bold; color: var(--ingelec-blue); margin-bottom: 5px; }
        .app-version { font-size: 0.8em; color: #7f8c8d; }

        /* زر الدخول (اختياري، أو يمكن أن يختفي تلقائياً) */
        .entry-btn {
            width: 80%; max-width: 300px; padding: 18px; border: none; border-radius: 12px;
            background: var(--ingelec-blue); color: white; font-size: 1.1em;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .entry-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-container">
        <div class="logo-box">
            <div class="logo-diamond">
                <div class="logo-line main"></div>
                <div class="logo-line branch"></div>
                <div class="logo-line red"></div>
            </div>
            <div class="logo-text">ingelec</div>
        </div>
        <div class="slogan">Un courant de confiance</div>
    </div>

    <div class="app-title-card">
        <div class="app-name">ProTask Planning</div>
        <div class="app-version">v1.2 - Maintenance & Services</div>
    </div>

    <button class="entry-btn" onclick="startApp()">Se Connecter / Continuer</button>
</div>

<div id="app-content" style="display:none; padding:15px;">
    </div>

<script>
    // دالة الدخول إلى التطبيق
    function startApp() {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        // هنا يمكن نعيطو على init() ديال التطبيق الرئيسي إيلا كان موجود
    }
</script>
</body>
</html>
