<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingelec Maintenance</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { --ingelec-blue: #0056b3; --dark-grey: #2c3e50; --light-bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); padding: 15px; color: var(--dark-grey); margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; background: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--ingelec-blue); }
        .day-card { background: white; border-radius: 15px; margin-bottom: 12px; padding: 15px; border-left: 6px solid var(--ingelec-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .day-title { font-weight: bold; color: var(--ingelec-blue); margin-bottom: 8px; border-bottom: 1px dashed #ddd; }
        .shift-info { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f1f1; font-size: 0.95em; }
        .name { font-weight: 600; color: var(--dark-grey); }
        .archive-btn { width: 100%; padding: 15px; background: var(--dark-grey); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .archive-content { display: none; margin-top: 12px; }
        .archive-week { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #dee2e6; box-shadow: inset 3px 0 0 var(--ingelec-blue); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div style="font-size: 2.2em; font-weight: 900; color: #0056b3;">INGELEC</div>
        <div style="font-size: 0.8em; font-weight: bold; color: #7f8c8d; letter-spacing: 2px;">MAINTENANCE APP</div>
        <p id="currentDate" style="margin-top:10px; font-size:0.9em;"></p>
    </div>
    <div id="schedule"></div>
    <button class="archive-btn" onclick="toggleArchive()">📁 VOIR L'ARCHIVE HISTORIQUE</button>
    <div id="archiveContent" class="archive-content"></div>
</div>

<script>
    const techs = ["Ismail", "Hamza", "Hicham"];
    const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
    function getRotation(date) {
        const ref = new Date('2026-04-06');
        const diffWeeks = Math.floor((date - ref) / (604800000));
        const cycle = ((diffWeeks % 3) + 3) % 3;
        return cycle === 0 ? ["Ismail", "Hamza", "Hicham"] : cycle === 1 ? ["Hamza", "Hicham", "Ismail"] : ["Hicham", "Ismail", "Hamza"];
    }
    function init() {
        const today = new Date();
        document.getElementById('currentDate').innerText = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        saveToArchive(); renderCurrentWeek(); renderArchive();
    }
    function renderCurrentWeek() {
        const scheduleDiv = document.getElementById('schedule');
        const shifts = getRotation(new Date());
        let html = "";
        days.forEach(day => {
            html += `<div class="day-card"><div class="day-title">${day}</div>
                <div class="shift-info"><span>🌅 Matin</span> <span class="name">${shifts[0]}</span></div>
                <div class="shift-info"><span>🌇 Après-midi</span> <span class="name">${shifts[1]}</span></div>
                <div class="shift-info"><span>🌃 Nuit</span> <span class="name">${shifts[2]}</span></div></div>`;
        });
        scheduleDiv.innerHTML = html;
    }
    function saveToArchive() {
        const today = new Date();
        const weekNum = Math.ceil((((today - new Date(today.getFullYear(), 0, 1)) / 86400000) + 1) / 7);
        const weekKey = `ing_v2_${today.getFullYear()}_${weekNum}`;
        let archive = JSON.parse(localStorage.getItem('ingelec_archive_v2') || '{}');
        if (!archive[weekKey]) {
            archive[weekKey] = { range: "Semaine " + weekNum + " (" + today.getFullYear() + ")", staff: getRotation(today), ts: today.getTime() };
            localStorage.setItem('ingelec_archive_v2', JSON.stringify(archive));
        }
    }
    function renderArchive() {
        const archiveDiv = document.getElementById('archiveContent');
        let archive = JSON.parse(localStorage.getItem('ingelec_archive_v2') || '{}');
        const sorted = Object.keys(archive).sort((a,b) => archive[b].ts - archive[a].ts);
        archiveDiv.innerHTML = sorted.map(k => `<div class="archive-week"><h4>📊 ${archive[k].range}</h4>M: ${archive[k].staff[0]} | A: ${archive[k].staff[1]} | N: ${archive[k].staff[2]}</div>`).join('') || "Aucun historique.";
    }
    function toggleArchive() { const c = document.getElementById('archiveContent'); c.style.display = c.style.display === 'block' ? 'none' : 'block'; }
    init();
</script>
</body>
</html>
