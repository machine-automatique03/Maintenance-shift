<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingelec - Planning Hebdomadaire</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { margin: 0; color: var(--primary); font-size: 1.2em; text-transform: uppercase; }
        
        .day-card { background: white; border-radius: 15px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 8px solid #bdc3c7; }
        .is-today { border-left-color: #27ae60; background: #f0fff4; transform: scale(1.02); }
        
        .day-title { padding: 10px 15px; font-weight: bold; background: #f8f9fa; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .is-today .day-title { background: #27ae60; color: white; }
        
        .shift-grid { padding: 5px 15px; }
        .shift-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f1f1; align-items: center; }
        .shift-item:last-child { border-bottom: none; }
        
        .label { font-size: 0.8em; color: #7f8c8d; font-weight: 600; }
        .name { font-weight: bold; color: var(--primary); cursor: pointer; text-decoration: underline dotted #ccc; }
        
        .holiday-card { background: #ffebee; color: var(--accent); text-align: center; padding: 20px; border-radius: 15px; font-weight: bold; margin-top: 10px; border: 2px dashed var(--accent); }
        .btn-reset { display: block; width: 100%; padding: 12px; margin-top: 20px; border: none; background: #95a5a6; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .footer-info { text-align: center; font-size: 0.75em; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Planning Maintenance</h2>
        <div id="weekRange" style="font-size: 0.9em; color: #7f8c8d; margin-top: 5px;"></div>
    </div>

    <div id="schedule"></div>

    <div class="holiday-card">
        🛑 DIMANCHE : REPOS TOTAL 🛑
    </div>

    <button class="btn-reset" onclick="resetToAuto()">Réinitialiser au Planning Auto</button>
    <p class="footer-info">Appuyez sur un nom pour faire un "Swap" manuel.</p>
</div>

<script>
    const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
    
    function getWeekRotation() {
        // Date de référence : Lundi 6 Avril 2026
        const ref = new Date('2026-04-06');
        const now = new Date();
        const diffWeeks = Math.floor((now - ref) / (1000 * 60 * 60 * 24 * 7));
        const cycle = ((diffWeeks % 3) + 3) % 3;

        // Rotation automatique des 3 techniciens
        if (cycle === 0) return ["Ismail", "Hamza", "Hicham"];
        if (cycle === 1) return ["Hamza", "Hicham", "Ismail"];
        return ["Hicham", "Ismail", "Hamza"];
    }

    function render() {
        const scheduleDiv = document.getElementById('schedule');
        scheduleDiv.innerHTML = "";
        const today = new Date();
        const currentDayIdx = today.getDay(); // 0=Dim, 1=Lun...
        
        // Récupérer les noms (Auto ou Manuel)
        let currentTechs = JSON.parse(localStorage.getItem('ingelec_weekly_data'));
        const savedWeek = localStorage.getItem('ingelec_saved_week');
        const thisWeek = Math.floor((today - new Date('2026-04-06')) / (1000 * 60 * 60 * 24 * 7));

        if (!currentTechs || savedWeek != thisWeek) {
            currentTechs = getWeekRotation();
            localStorage.setItem('ingelec_weekly_data', JSON.stringify(currentTechs));
            localStorage.setItem('ingelec_saved_week', thisWeek);
        }

        days.forEach((day, i) => {
            const isToday = (i + 1) === currentDayIdx;
            const card = document.createElement('div');
            card.className = `day-card ${isToday ? 'is-today' : ''}`;
            
            card.innerHTML = `
                <div class="day-title">
                    <span>${day}</span>
                    <span style="font-size: 0.7em;">${isToday ? 'AUJOURD\'HUI' : ''}</span>
                </div>
                <div class="shift-grid">
                    <div class="shift-item">
                        <span class="label">☀️ MATIN (06-14)</span>
                        <span class="name" onclick="swap(0)">${currentTechs[0]}</span>
                    </div>
                    <div class="shift-item">
                        <span class="label">⛅ SOIR (14-22)</span>
                        <span class="name" onclick="swap(1)">${currentTechs[1]}</span>
                    </div>
                    <div class="shift-item">
                        <span class="label">🌑 NUIT (22-06)</span>
                        <span class="name" onclick="swap(2)">${currentTechs[2]}</span>
                    </div>
                </div>
            `;
            scheduleDiv.appendChild(card);
        });
    }

    function swap(idx) {
        const newName = prompt("Changer le technicien pour ce shift :");
        if (newName) {
            let data = JSON.parse(localStorage.getItem('ingelec_weekly_data'));
            data[idx] = newName;
            localStorage.setItem('ingelec_weekly_data', JSON.stringify(data));
            render();
        }
    }

    function resetToAuto() {
        if(confirm("Voulez-vous revenir au planning automatique ?")) {
            localStorage.removeItem('ingelec_weekly_data');
            render();
        }
    }

    render();
</script>
</body>
</html>
