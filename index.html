<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingelec Maintenance Planning</title>
    <style>
        :root { --ingelec-blue: #0056b3; --dark-grey: #2c3e50; --light-bg: #f8f9fa; --gold: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-bg); padding: 0; margin: 0; color: var(--dark-grey); }
        
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        .header { 
            text-align: center; 
            background: white; 
            padding: 20px; 
            border-radius: 0 0 20px 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--ingelec-blue); 
        }

        .search-section { 
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 2px solid var(--ingelec-blue); 
        }

        input[type="date"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 1rem;
        }

        #searchResult { 
            display: none; 
            margin-top: 15px; 
            padding: 15px; 
            background: #f0f7ff; 
            border-radius: 10px; 
            border-left: 5px solid var(--gold); 
        }

        .day-card { 
            background: white; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            padding: 15px; 
            border-left: 6px solid var(--ingelec-blue); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }

        .day-title { 
            font-weight: bold; 
            color: var(--ingelec-blue); 
            margin-bottom: 8px; 
            border-bottom: 1px dashed #ddd; 
            padding-bottom: 5px; 
            text-transform: capitalize;
        }

        .shift-info { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid #f1f1f1; 
            font-size: 0.95em; 
        }

        .shift-info:last-child { border-bottom: none; }
        .name { font-weight: 600; color: var(--dark-grey); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 2.2em; font-weight: 900; color: #0056b3;">INGELEC</div>
        <div style="font-size: 0.8em; font-weight: bold; color: #7f8c8d;">MAINTENANCE PLANNING</div>
        <p id="currentDateDisplay" style="margin-top:10px; font-size:0.9em; color: var(--gold); font-weight: bold;"></p>
    </div>

        <div style="font-weight:bold; margin-bottom:10px; color:var(--ingelec-blue)">🔍 Consulter une date</div>
